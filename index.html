<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #111;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<model-viewer 
  src="test.glb"

  camera-controls
  auto-rotate
  rotation-per-second="10deg"

  exposure="1.3"

  shadow-intensity="1"
  shadow-softness="0.8"

  camera-orbit="0deg 75deg 120%"
  field-of-view="30deg"

  interaction-prompt="none">

</model-viewer>

</body>
</html>
